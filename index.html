<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header with Theme Toggle -->
        <header>
            <h1>💰 Expense & Budget Visualizer</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="icon">🌙</span>
            </button>
        </header>

        <!-- Total Balance Display -->
        <div class="balance-card">
            <h2>TOTAL BALANCE</h2>
            <p class="balance-amount" id="totalBalance">$0</p>
        </div>

        <!-- Input Form -->
        <div class="form-card">
            <h3>Add New Transaction</h3>
            <form id="expenseForm">
                <div class="form-group">
                    <label for="itemName">Item Name</label>
                    <input 
                        type="text" 
                        id="itemName" 
                        placeholder="e.g., Lunch, Taxi, Movie"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="amount">Amount </label>
                    <input 
                        type="number" 
                        id="amount" 
                        placeholder="e.g., 50000"
                        min="1"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">-- Select Category --</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Fun">Fun</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Add Transaction</button>
            </form>
        </div>

        <!-- Sorting Controls -->
        <div class="controls-card">
            <h3>Sort Transactions</h3>
            <div class="sort-buttons">
                <button id="sortHighest" class="btn-secondary">Highest First</button>
                <button id="sortLowest" class="btn-secondary">Lowest First</button>
                <button id="sortDefault" class="btn-secondary">Default Order</button>
            </div>
        </div>

        <!-- Transaction List -->
        <div class="transactions-card">
            <h3>Transaction History</h3>
            <div id="transactionList" class="transaction-list">
                <p class="empty-state">No transactions yet. Add your first expense above!</p>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-card">
            <h3>Spending Distribution by Category</h3>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
